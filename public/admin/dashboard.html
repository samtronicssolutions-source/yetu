<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .admin-container {
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
        }
        .sidebar h2 {
            padding: 20px;
            background: #1a2a3a;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }
        .sidebar li a:hover {
            background: #34495e;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            margin-bottom: 10px;
            color: #666;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #f57224;
        }
        .btn-add {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
        }
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            border-radius: 3px;
            text-decoration: none;
            margin: 0 5px;
        }
        .btn-edit {
            background: #3498db;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>Yetu Admin</h2>
            <ul>
                <li><a href="/admin/dashboard"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                <li><a href="#" onclick="showAddProductModal()"><i class="fas fa-plus"></i> Add Product</a></li>
                <li><a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-add" onclick="showAddProductModal()">Add New Product</button>
            </div>
            
            <div class="stats-grid" id="stats"></div>
            
            <h2>Recent Products</h2>
            <div id="productsTable"></div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <h2>Add New Product</h2>
            <form id="addProductForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Price (KSh)</label>
                    <input type="number" name="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category_id" id="categorySelect" required></select>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" required>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="featured" value="true"> Featured Product
                    </label>
                </div>
                <button type="submit" class="btn-add">Save Product</button>
                <button type="button" onclick="closeModal()" style="margin-left: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login';
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const stats = await response.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><h3>Total Products</h3><div class="value">${stats.totalProducts}</div></div>
                    <div class="stat-card"><h3>Total Orders</h3><div class="value">${stats.totalOrders}</div></div>
                    <div class="stat-card"><h3>Pending Orders</h3><div class="value">${stats.pendingOrders}</div></div>
                    <div class="stat-card"><h3>Total Revenue</h3><div class="value">KSh ${stats.totalRevenue.toLocaleString()}</div></div>
                `;
                
                const productsResponse = await fetch('/api/products');
                const products = await productsResponse.json();
                
                document.getElementById('productsTable').innerHTML = `
                    <table>
                        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${products.slice(0, 10).map(p => `
                                <tr>
                                    <td><img src="${p.image || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover;"></td>
                                    <td>${p.name}</td>
                                    <td>KSh ${p.price.toLocaleString()}</td>
                                    <td>${p.stock}</td>
                                    <td>
                                        <button class="btn-edit" onclick="editProduct('${p._id}')">Edit</button>
                                        <button class="btn-delete" onclick="deleteProduct('${p._id}')">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();
                const select = document.getElementById('categorySelect');
                select.innerHTML = categories.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (response.ok) {
                    closeModal();
                    loadDashboard();
                    alert('Product added successfully!');
                } else {
                    alert('Failed to add product');
                }
            } catch (error) {
                console.error('Error adding product:', error);
            }
        });

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    const response = await fetch(`/api/products/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        loadDashboard();
                        alert('Product deleted successfully!');
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }
        }

        function showAddProductModal() {
            loadCategories();
            document.getElementById('addProductModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addProductModal').style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }

        loadDashboard();
    </script>
</body>
</html>
