<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .admin-container {
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
        }
        .sidebar h2 {
            padding: 20px;
            background: #1a2a3a;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }
        .sidebar li a:hover {
            background: #34495e;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            margin-bottom: 10px;
            color: #666;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #f57224;
        }
        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>Yetu Admin</h2>
            <ul>
                <li><a href="/admin/dashboard"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                <li><a href="#" onclick="alert('Use MongoDB Atlas to add products')"><i class="fas fa-plus"></i> Add Product</a></li>
                <li><a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
            
            <div class="stats-grid" id="stats">
                <div class="stat-card"><h3>Total Products</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Total Orders</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Pending Orders</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Total Revenue</h3><div class="value">-</div></div>
            </div>
            
            <h2>Recent Products</h2>
            <div id="productsTable" class="loading">Loading...</div>
        </div>
    </div>

    <script>
        // Check authentication immediately
        const token = localStorage.getItem('adminToken');
        
        if (!token) {
            // No token, redirect to login
            window.location.href = '/admin/login';
        }
        
        // Verify token is valid by making a test request
        async function verifyAuth() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    // Token invalid, redirect to login
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminUser');
                    window.location.href = '/admin/login';
                }
            } catch (error) {
                console.error('Auth verification error:', error);
                // Don't redirect on network error - just show error
            }
        }
        
        async function loadDashboard() {
            try {
                // Load stats
                const statsRes = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!statsRes.ok) {
                    throw new Error('Failed to load stats');
                }
                
                const stats = await statsRes.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><h3>Total Products</h3><div class="value">${stats.totalProducts || 0}</div></div>
                    <div class="stat-card"><h3>Total Orders</h3><div class="value">${stats.totalOrders || 0}</div></div>
                    <div class="stat-card"><h3>Pending Orders</h3><div class="value">${stats.pendingOrders || 0}</div></div>
                    <div class="stat-card"><h3>Total Revenue</h3><div class="value">KSh ${(stats.totalRevenue || 0).toLocaleString()}</div></div>
                `;
                
                // Load products
                const productsRes = await fetch('/api/products');
                const products = await productsRes.json();
                
                if (products.length === 0) {
                    document.getElementById('productsTable').innerHTML = '<p style="text-align:center;padding:40px;">No products found. Add your first product via MongoDB Atlas!</p>';
                } else {
                    document.getElementById('productsTable').innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Featured</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${products.slice(0, 10).map(p => `
                                    <tr>
                                        <td>${p.name}</td>
                                        <td>KSh ${p.price.toLocaleString()}</td>
                                        <td>${p.stock}</td>
                                        <td>${p.featured ? 'Yes' : 'No'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('stats').innerHTML = '<div class="stat-card"><h3>Error</h3><div class="value">-</div></div>';
                document.getElementById('productsTable').innerHTML = '<p style="text-align:center;padding:40px;color:red;">Error loading products. Check your database connection.</p>';
            }
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }
        
        // Run auth verification and load dashboard
        verifyAuth();
        loadDashboard();
    </script>
</body>
</html>
