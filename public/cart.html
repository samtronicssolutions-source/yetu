<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cart-table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .cart-table th, .cart-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .cart-table th {
            background: #f8f9fa;
        }
        .cart-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .cart-summary {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: right;
        }
        .cart-total {
            font-size: 24px;
            font-weight: bold;
            color: #f57224;
        }
        .btn-checkout {
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-update {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .empty-cart {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main>
        <div class="container">
            <h1>Shopping Cart</h1>
            <div id="cartContent"></div>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>
    
    <script src="/js/main.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        async function loadCartPage() {
            const cart = getCart();
            const productIds = Object.keys(cart);
            
            if (productIds.length === 0) {
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart" style="font-size: 64px; color: #ccc;"></i>
                        <h2>Your cart is empty</h2>
                        <a href="/" class="btn-primary" style="margin-top: 20px; display: inline-block;">Continue Shopping</a>
                    </div>
                `;
                return;
            }
            
            try {
                const products = [];
                let total = 0;
                
                for (const id of productIds) {
                    const response = await fetch(`/api/products/${id}`);
                    const product = await response.json();
                    const quantity = cart[id];
                    const subtotal = product.price * quantity;
                    total += subtotal;
                    products.push({ ...product, quantity, subtotal });
                }
                
                document.getElementById('cartContent').innerHTML = `
                    <div>
                        <table class="cart-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${products.map(p => `
                                    <tr>
                                        <td>
                                            <img src="${p.image || 'https://via.placeholder.com/80'}" alt="${p.name}" style="width: 80px; height: 80px; object-fit: cover; margin-right: 15px;">
                                            ${p.name}
                                        </td>
                                        <td>KSh ${p.price.toLocaleString()}</td>
                                        <td>
                                            <input type="number" id="qty_${p._id}" value="${p.quantity}" min="1" 
                                                   style="width: 60px; padding: 5px;">
                                        </td>
                                        <td>KSh ${p.subtotal.toLocaleString()}</td>
                                        <td>
                                            <button onclick="removeFromCart('${p._id}')" style="background: none; border: none; color: #e74c3c; cursor: pointer;">
                                                <i class="fas fa-trash"></i> Remove
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        
                        <div class="cart-actions">
                            <button class="btn-update" onclick="updateAllQuantities()">Update Cart</button>
                            <button class="btn-checkout" onclick="proceedToCheckout()">Proceed to Checkout</button>
                        </div>
                        
                        <div class="cart-summary">
                            <h3>Order Summary</h3>
                            <p>Subtotal: <strong>KSh ${total.toLocaleString()}</strong></p>
                            <p>Shipping: <strong>Free</strong></p>
                            <hr>
                            <p class="cart-total">Total: KSh ${total.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        function updateAllQuantities() {
            const cart = getCart();
            for (const id of Object.keys(cart)) {
                const qtyInput = document.getElementById(`qty_${id}`);
                if (qtyInput) {
                    const newQty = parseInt(qtyInput.value);
                    if (newQty > 0) {
                        cart[id] = newQty;
                    } else {
                        delete cart[id];
                    }
                }
            }
            saveCart(cart);
            loadCartPage();
            showNotification('Cart updated!');
        }
        
        function proceedToCheckout() {
            const cart = getCart();
            if (Object.keys(cart).length === 0) {
                showNotification('Your cart is empty!', 'error');
                return;
            }
            window.location.href = '/checkout';
        }
        
        async function loadHeaderFooter() {
            try {
                const headerResponse = await fetch('/header.html');
                const footerResponse = await fetch('/footer.html');
                const header = await headerResponse.text();
                const footer = await footerResponse.text();
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
                updateCartCount();
            } catch (error) {
                console.error('Error loading header/footer:', error);
            }
        }
        
        loadHeaderFooter();
        loadCartPage();
    </script>
</body>
</html>
