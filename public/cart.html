<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>.cart-table{width:100%;background:white;border-radius:10px;overflow:hidden;margin:20px 0}.cart-table th,.cart-table td{padding:15px;text-align:left;border-bottom:1px solid #eee}.cart-table th{background:#f8f9fa}.cart-actions{display:flex;justify-content:space-between;margin-top:20px}.cart-summary{background:white;padding:20px;border-radius:10px;margin-top:20px;text-align:right}.cart-total{font-size:24px;font-weight:bold;color:#f57224}.btn-checkout{background:#27ae60;color:white;padding:12px 30px;border:none;border-radius:5px;cursor:pointer}.btn-update{background:#3498db;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer}.empty-cart{text-align:center;padding:50px;background:white;border-radius:10px}</style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main><div class="container"><h1>Shopping Cart</h1><div id="cartContent"></div></div></main>
    <div id="footer-placeholder"></div>
    <script src="/js/main.js"></script><script src="/js/cart.js"></script>
    <script>
        async function loadHeaderFooter() {
            const header = await (await fetch('/header.html')).text();
            const footer = await (await fetch('/footer.html')).text();
            document.getElementById('header-placeholder').innerHTML = header;
            document.getElementById('footer-placeholder').innerHTML = footer;
            updateCartCount();
            if (typeof loadNavCategories === 'function') loadNavCategories();
        }
        loadHeaderFooter();
        if (typeof loadCartPage === 'function') loadCartPage();
    </script>
</body>
</html>
