<script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const categoryId = urlParams.get('id');
    const searchQuery = urlParams.get('search');
    
    // Load products based on search or category
    async function loadProducts() {
        let url = '/api/products';
        if (categoryId) {
            url += `?category=${categoryId}`;
        } else if (searchQuery) {
            url += `?search=${searchQuery}`;
        }
        
        try {
            const response = await fetch(url);
            const products = await response.json();
            displayProducts(products);
            
            // Update page title
            if (searchQuery) {
                document.getElementById('pageTitle').textContent = `Search Results: "${searchQuery}"`;
                document.getElementById('resultsCount').textContent = `${products.length} products found for "${searchQuery}"`;
            }
        } catch (error) {
            console.error('Error loading products:', error);
        }
    }
    
    function displayProducts(products) {
        const grid = document.getElementById('productsGrid');
        if (products.length === 0) {
            grid.innerHTML = `
                <div style="text-align: center; padding: 50px;">
                    <i class="fas fa-search" style="font-size: 48px; color: #ccc;"></i>
                    <h3>No products found</h3>
                    <p>Try searching for something else</p>
                    <a href="/" class="btn-primary">Back to Home</a>
                </div>
            `;
        } else {
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-image">
                        <a href="/product/${p._id}">
                            <img src="${p.image || 'https://via.placeholder.com/250'}" alt="${p.name}">
                        </a>
                    </div>
                    <div class="product-info">
                        <h3><a href="/product/${p._id}">${p.name}</a></h3>
                        <p class="price">KSh ${p.price.toLocaleString()}</p>
                        <button onclick="addToCart('${p._id}')" class="btn-add-to-cart">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }
    }
    
    loadProducts();
</script>
